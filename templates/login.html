<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DB Link Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #c0392b 0%, #2c3e50 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: white; border-radius: 16px; padding: 40px;
            width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo-icon { font-size: 44px; }
        .logo h1 { font-size: 26px; font-weight: 800; color: #c0392b; margin-top: 8px; }
        .logo p { color: #636e72; font-size: 13px; margin-top: 4px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #2c3e50; }
        input {
            width: 100%; padding: 11px 14px; border: 1.5px solid #dfe6e9;
            border-radius: 8px; font-size: 14px; transition: border 0.2s;
        }
        input:focus { outline: none; border-color: #c0392b; }
        .btn {
            width: 100%; padding: 13px; background: #c0392b; color: white;
            border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
            cursor: pointer; transition: background 0.2s; margin-top: 4px;
        }
        .btn:hover { background: #922b21; }
        .alert { padding: 10px 14px; background: #fadbd8; color: #c0392b; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .footer-note { text-align: center; font-size: 12px; color: #b2bec3; margin-top: 24px; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">
        <div class="logo-icon">📡</div>
        <h1>DB Link Portal</h1>
        <p>Dainik Bhaskar Network Management</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert">{{ msg }}</div>
    {% endfor %}
    {% endwith %}
    <form method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username" required autofocus>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn">🔐 Login</button>
    </form>
    <div class="footer-note">
        Pan India Link Management System<br>
        © 2025 Dainik Bhaskar Group
    </div>
</div>
</body>
</html>
