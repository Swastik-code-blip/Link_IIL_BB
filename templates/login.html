<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — DB Link Management Portal</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;min-height:100vh;background:linear-gradient(135deg,#c0392b 0%,#1e2a35 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:38px 36px;width:100%;max-width:420px;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.logo{text-align:center;margin-bottom:24px}
.logo img{height:54px;object-fit:contain;margin-bottom:10px}
.logo .name{font-size:21px;font-weight:800;color:#c0392b;letter-spacing:.3px}
.logo .sub{font-size:12px;color:#718096;margin-top:3px}
hr{border:none;border-top:1px solid #e2e8f0;margin:18px 0}
.flash{padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:13px;display:flex;align-items:center;gap:8px;background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:700;color:#2d3748;margin-bottom:5px}
.inp-wrap{position:relative}
.inp-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#a0aec0;font-size:13px}
input{width:100%;padding:11px 12px 11px 36px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;transition:border .2s;background:#f7fafc}
input:focus{border-color:#c0392b;background:#fff}
.btn-submit{width:100%;padding:12px;background:linear-gradient(135deg,#c0392b,#96281b);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;letter-spacing:.4px;transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-submit:hover{opacity:.9}
.footer-note{text-align:center;margin-top:16px;font-size:11px;color:#a0aec0}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Dainik_Bhaskar_Logo.svg/320px-Dainik_Bhaskar_Logo.svg.png"
         alt="Dainik Bhaskar"
         onerror="this.style.display='none'">
    <div class="name">Link Management Portal</div>
    <div class="sub">Pan India IT Network Management System</div>
  </div>
  <hr>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="flash"><i class="fas fa-exclamation-circle"></i>{{ msg }}</div>
  {% endfor %}{% endwith %}
  <form method="POST" autocomplete="off">
    <div class="form-group">
      <label>Username</label>
      <div class="inp-wrap">
        <i class="fas fa-user"></i>
        <input type="text" name="username" placeholder="apna username daalein" required autofocus>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="inp-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" placeholder="password daalein" required>
      </div>
    </div>
    <button type="submit" class="btn-submit">
      <i class="fas fa-right-to-bracket"></i> Login
    </button>
  </form>
  <div class="footer-note">IT Department — Dainik Bhaskar Group &nbsp;|&nbsp; v2.0</div>
</div>
</body>
</html>
